name: 🚀 Deploy to Azure App Service

on:
  push:
    branches: [ main ]
  workflow_dispatch: # Permite ejecutar manualmente desde GitHub

env:
  ACR_NAME: ${{ secrets.ACR_NAME }}
  IMAGE_NAME: academic-risk-predictor
  AZURE_WEBAPP_NAME: ${{ secrets.AZURE_WEBAPP_NAME }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    # 1. Checkout del código
    - name: 📥 Checkout code
      uses: actions/checkout@v3

    # 2. Login a Azure Container Registry
    - name: 🔐 Login to ACR
      uses: docker/login-action@v2
      with:
        registry: ${{ secrets.ACR_NAME }}.azurecr.io
        username: ${{ secrets.ACR_USERNAME }}
        password: ${{ secrets.ACR_PASSWORD }}

    # 3. Construir la imagen Docker
    - name: 🏗️ Build Docker image
      run: |
        docker build -t ${{ secrets.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }} \
                     -t ${{ secrets.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:latest .
        echo "✅ Imagen construida con tags:"
        echo "   - ${{ github.sha }} (commit específico)"
        echo "   - latest (última versión)"

    # 4. Subir imagen a ACR
    - name: 📤 Push to ACR
      run: |
        docker push ${{ secrets.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}
        docker push ${{ secrets.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:latest
        echo "✅ Imagen subida al registry"

    # 5. Login a Azure CLI
    - name: 🔑 Azure Login
      uses: azure/login@v1
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    # 6. Deploy a Azure App Service
    - name: 🚀 Deploy to Azure Web App
      uses: azure/webapps-deploy@v2
      with:
        app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
        images: ${{ secrets.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}

    # 7. Verificar deployment
    - name: ✅ Verify deployment
      run: |
        echo "🎉 Deployment completado!"
        echo "🌐 URL: https://${{ secrets.AZURE_WEBAPP_NAME }}.azurewebsites.net"
        echo "📊 Verifica el estado en: https://portal.azure.com"
