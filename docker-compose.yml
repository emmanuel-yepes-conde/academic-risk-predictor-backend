version: '3.8'

services:
  backend:
    build: .
    container_name: academic-risk-predictor
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
      - HOST=0.0.0.0
      - LOG_LEVEL=info
    volumes:
      # Opcional: monta el código para desarrollo (hot-reload)
      # - ./app:/code/app
      # - ./ml_models:/code/ml_models
      - logs:/code/logs
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  logs:
